services:
  postgre:
    image: postgres:16-alpine
    restart: always
    env_file:
      - ./backend/.env
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:8-alpine
    restart: always
  backend:
    depends_on:
      - postgre   
      - redis
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    env_file:
      - ./backend/.env
    ports:
      - "3000:3000"
    volumes:
      - /app/node_modules
      - ./backend:/app
volumes:
  pgdata: